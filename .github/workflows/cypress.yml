name: Cypress E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:   # <-- allow manual testing

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java for Spring Boot
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Build backend (Spring Boot)
      - name: Build backend
        working-directory: backend
        run: mvn -B package --file pom.xml

      # 4. Start backend
      - name: Start Spring Boot server
        working-directory: backend
        run: |
          mvn spring-boot:run &
          sleep 10

      # 5. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 6. Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # 7. Start frontend
      - name: Start frontend server
        working-directory: frontend
        run: |
          npm run dev &
          sleep 10

      # 8. Run Cypress E2E tests
      - name: Run Cypress Tests
        working-directory: frontend
        run: npx cypress run --spec "cypress/e2e/login/login.spec.js"

      # 9. Upload results (updated action v4)
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: frontend/cypress/results
